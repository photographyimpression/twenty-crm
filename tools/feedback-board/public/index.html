<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Feedback Board</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗂️</text></svg>" />
    <style>
      /* Light "Zrizes" look (Moshe's reference screenshot): white page, thin
         gray borders, numbered column headers with subtitles, outline chips,
         small green/outline action buttons, icon-only delete. */
      :root {
        --bg: #fafbfc;
        --panel: #ffffff;
        --panel-2: #f7f9fc;
        --border: #e5e8ee;
        --border-2: #d8dde6;
        --text: #1a2230;
        --muted: #7b8494;
        --accent: #5b5bd6;
        --accent-hover: #4a4ac2;
        --blue: #3b82f6;
        --green: #16a34a;
        --green-hover: #12873d;
        --red: #ef4444;
        --amber-bg: #fffdf5;
        --amber-border: #f3e3b3;
        --orange: #d97706;
        --shadow: 0 1px 3px rgba(20, 30, 50, 0.06);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }
      header {
        padding: 26px 28px 6px; max-width: 1500px; margin: 0 auto;
      }
      header h1 { margin: 0; font-size: 22px; font-weight: 800; }
      header .subtitle { color: var(--muted); font-size: 13.5px; margin-top: 6px; }
      main { max-width: 1500px; margin: 0 auto; padding: 14px 20px 60px; }

      /* Buttons */
      button.btn, a.btn {
        border: 1px solid var(--border-2); border-radius: 9px; padding: 7px 12px;
        font-size: 13px; font-weight: 600; cursor: pointer; background: var(--panel);
        color: var(--text); font-family: inherit; text-decoration: none;
        display: inline-flex; align-items: center; gap: 6px;
        transition: background .12s ease, border-color .12s ease;
      }
      button.btn:hover:not(:disabled), a.btn:hover { background: var(--panel-2); }
      button.btn:disabled { opacity: .5; cursor: default; }
      .btn-green { background: var(--green); border-color: var(--green); color: #fff; }
      .btn-green:hover:not(:disabled) { background: var(--green-hover); border-color: var(--green-hover); }
      .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
      .btn-primary:hover:not(:disabled) { background: var(--accent-hover); border-color: var(--accent-hover); }
      .btn-sm { padding: 5px 10px; font-size: 12.5px; border-radius: 8px; }
      .icon-btn {
        background: none; border: none; cursor: pointer; color: #b3bac6;
        font-size: 15px; padding: 2px 4px; line-height: 1; border-radius: 6px;
      }
      .icon-btn:hover { color: var(--red); background: #fef2f2; }

      /* Board layout */
      /* minmax(0,1fr): plain 1fr lets nowrap delivered titles blow the column
         wide open — min-width 0 forces them to ellipsize instead. */
      .board { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px; align-items: start; }
      @media (max-width: 1080px) { .board { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
      @media (max-width: 620px) { .board { grid-template-columns: 1fr; } }
      .col {
        background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
        padding: 16px 14px; min-height: 140px; box-shadow: var(--shadow);
      }
      .col-head { margin-bottom: 12px; }
      .col-title-row { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
      .col-title { font-weight: 800; font-size: 15px; }
      .col-title .num { color: var(--muted); font-weight: 700; }
      .col-count { color: var(--muted); font-size: 13px; font-weight: 700; }
      .col-sub { color: var(--muted); font-size: 12px; margin-top: 3px; }
      .col-empty { color: var(--muted); font-size: 13px; text-align: center; padding: 22px 8px; }

      /* Cards */
      .kcard {
        background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
        padding: 12px 13px; margin-bottom: 10px; box-shadow: var(--shadow);
      }
      .kcard.review { background: var(--amber-bg); border-color: var(--amber-border); }
      .kcard:last-child { margin-bottom: 0; }
      .kcard-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
      .kcard-top .spacer { flex: 1; }
      .pill {
        display: inline-flex; align-items: center; gap: 4px; border-radius: 999px;
        padding: 2px 9px; font-size: 11.5px; font-weight: 700; background: var(--panel);
      }
      .pill-feature { border: 1px solid var(--border-2); color: #444c5c; }
      .pill-bug { border: 1px solid #f3c1c1; color: #c03030; }
      .kcard-title { font-weight: 700; font-size: 14.5px; line-height: 1.35; margin: 2px 0 6px; }
      .kcard-field { font-size: 13px; color: #3c4656; margin: 6px 0; line-height: 1.5; }
      .kcard-field .lbl { color: var(--muted); font-weight: 700; font-size: 10.5px; text-transform: uppercase; letter-spacing: .4px; display: block; margin-bottom: 2px; }
      .kcard-meta { color: var(--muted); font-size: 11.5px; margin-top: 8px; }
      .shots { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
      .shots img { width: 56px; height: 56px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; }
      .shot-thumb { position: relative; display: inline-flex; }
      .shot-remove {
        position: absolute; top: -6px; right: -6px; width: 18px; height: 18px; border-radius: 50%;
        border: 2px solid var(--panel); background: var(--red); color: #fff; font-size: 12px; line-height: 1;
        cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0;
      }

      /* Claude's suggestion box (like the reference's MY SUGGESTION) */
      .claude-note {
        background: #fff; border: 1px solid var(--amber-border); border-radius: 10px;
        padding: 10px 12px; margin: 8px 0; font-size: 13px; line-height: 1.55; color: #4a4433;
      }
      .claude-note .lbl { color: var(--orange); font-weight: 800; font-size: 11px; text-transform: uppercase; letter-spacing: .4px; display: block; margin-bottom: 4px; }
      .delivered-note {
        background: #f2fbf5; border: 1px solid #cdebd6; border-radius: 10px;
        padding: 9px 11px; margin: 8px 0 4px; font-size: 12.5px; line-height: 1.5; color: #1d5c31;
      }
      .delivered-note .lbl { color: var(--green); font-weight: 800; font-size: 10.5px; text-transform: uppercase; display: block; margin-bottom: 3px; }

      /* Comments */
      .thread { margin: 8px 0 4px; display: flex; flex-direction: column; gap: 6px; }
      .cmt { font-size: 12.5px; line-height: 1.45; padding: 7px 9px; border-radius: 9px; background: var(--panel-2); border: 1px solid var(--border); }
      .kcard.review .cmt { background: #fff; }
      .cmt .who { font-weight: 800; font-size: 10.5px; text-transform: uppercase; letter-spacing: .3px; }
      .cmt.moshe .who { color: var(--blue); }
      .cmt.claude .who { color: var(--orange); }
      .cmt .when { color: var(--muted); font-size: 10.5px; margin-left: 6px; }
      .cmt-add { display: flex; gap: 6px; margin-top: 8px; }
      .cmt-add input { flex: 1; background: var(--panel); color: var(--text); border: 1px solid var(--border-2);
        border-radius: 8px; padding: 7px 9px; font-size: 12.5px; font-family: inherit; }
      .cmt-add input:focus { outline: none; border-color: var(--accent); }

      .kcard-actions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }

      /* Compact delivered rows */
      .drow {
        background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
        padding: 9px 11px; margin-bottom: 8px; box-shadow: var(--shadow); cursor: pointer;
      }
      .drow-line { display: flex; align-items: center; gap: 8px; }
      .drow-title { flex: 1; font-size: 13px; font-weight: 600; color: #3c4656;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .drow-date { color: var(--muted); font-size: 11.5px; white-space: nowrap; }
      .drow-detail { display: none; margin-top: 8px; cursor: auto; }
      .drow.open .drow-detail { display: block; }
      .drow.open .drow-title { white-space: normal; }

      /* Inline request form (always visible in column 1, like the reference) */
      .inline-form {
        border: 1.5px dashed var(--border-2); border-radius: 12px; padding: 12px; margin-bottom: 10px;
      }
      .inline-form .field { margin-bottom: 10px; }
      .inline-form label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 4px; }
      .inline-form label .opt { font-weight: 400; opacity: .8; }
      .inline-form textarea {
        width: 100%; background: var(--panel); color: var(--text); border: 1px solid var(--border-2);
        border-radius: 9px; padding: 9px 11px; font-size: 13px; font-family: inherit;
        min-height: 52px; line-height: 1.45; resize: vertical;
      }
      .inline-form textarea:focus { outline: none; border-color: var(--accent); }
      .type-toggle { display: flex; gap: 6px; }
      .type-toggle button {
        background: var(--panel); border: 1px solid var(--border-2); color: var(--muted);
        padding: 6px 12px; border-radius: 999px; cursor: pointer; font-weight: 700; font-size: 12.5px; font-family: inherit;
      }
      .type-toggle button.active { background: #23293a; border-color: #23293a; color: #fff; }
      .inline-form .form-hint { color: var(--muted); font-size: 11px; text-align: center; margin-top: 8px; }
      .form-err { color: var(--red); font-size: 12.5px; margin-top: 8px; min-height: 16px; }

      /* States / toast / lightbox */
      .state { text-align: center; padding: 60px 20px; color: var(--muted); }
      .spinner {
        width: 34px; height: 34px; border: 3px solid var(--border); border-top-color: var(--accent);
        border-radius: 50%; margin: 0 auto 16px; animation: spin .8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .toast {
        position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%) translateY(20px);
        background: var(--green); color: #fff; padding: 12px 20px; border-radius: 12px; font-weight: 700;
        box-shadow: 0 8px 24px rgba(20,30,50,.18); opacity: 0; pointer-events: none; transition: all .25s ease; z-index: 60;
      }
      .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
      .toast.err { background: var(--red); }
      .lightbox {
        position: fixed; inset: 0; background: rgba(15,20,30,.82); display: none; align-items: center;
        justify-content: center; z-index: 70; padding: 30px; cursor: zoom-out;
      }
      .lightbox.show { display: flex; }
      .lightbox img { max-width: 100%; max-height: 100%; border-radius: 10px; }
    </style>
  </head>
  <body>
    <header>
      <h1>Feedback Board</h1>
      <div class="subtitle">Private board — drop what you want or a bug (paste screenshots). Say “move everything right” and Claude builds column by column.</div>
    </header>

    <main>
      <div id="root" class="board">
        <div class="state"><div class="spinner"></div>Loading board…</div>
      </div>
    </main>

    <div class="toast" id="toast"></div>
    <div class="lightbox" id="lightbox"><img id="lightboxImg" alt="" /></div>

    <script src="app.js"></script>
  </body>
</html>
