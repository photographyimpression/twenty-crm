<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign in · Command Center</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>" />
    <style>
      :root {
        --bg: #0f1115;
        --panel: #171a21;
        --panel-2: #1e222b;
        --border: #2a2f3a;
        --text: #e6e9ef;
        --muted: #9aa3b2;
        --accent: #3b82f6;
        --accent-hover: #2f6fd6;
        --red: #ef4444;
        --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        background: radial-gradient(1200px 600px at 50% -10%, #1a2030 0%, var(--bg) 60%);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        display: flex; align-items: center; justify-content: center; min-height: 100vh;
      }
      .card {
        background: var(--panel); border: 1px solid var(--border);
        border-radius: 16px; box-shadow: var(--shadow);
        width: 320px; padding: 28px 26px;
      }
      .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 18px; margin-bottom: 4px; }
      .brand .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); }
      .sub { color: var(--muted); font-size: 13px; margin: 0 0 20px; }
      label { display: block; font-size: 12px; color: var(--muted); margin: 14px 0 6px; }
      input {
        width: 100%; box-sizing: border-box; background: var(--panel-2);
        border: 1px solid var(--border); color: var(--text);
        padding: 11px 12px; border-radius: 10px; font-size: 14px; outline: none;
      }
      input:focus { border-color: var(--accent); }
      button {
        width: 100%; margin-top: 20px; background: var(--accent); color: #fff;
        border: none; padding: 12px; border-radius: 10px; font-size: 14px;
        font-weight: 700; cursor: pointer;
      }
      button:hover { background: var(--accent-hover); }
      .err { color: var(--red); font-size: 13px; margin-top: 14px; display: none; }
      .err.show { display: block; }
      .foot { color: var(--muted); font-size: 11px; margin-top: 18px; text-align: center; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="brand"><span class="dot"></span> Command Center</div>
      <p class="sub">Sign in to your daily triage queue.</p>
      <!-- Real form POST so Chrome's password manager offers to save + autofill,
           exactly like Microsoft/Google logins. action is relative so it works
           under the /command-center/ mount. -->
      <form method="POST" action="login" autocomplete="on">
        <label for="username">Username</label>
        <input id="username" name="username" type="text"
               autocomplete="username" autocapitalize="none"
               autocorrect="off" spellcheck="false" required autofocus />
        <label for="password">Password</label>
        <input id="password" name="password" type="password"
               autocomplete="current-password" required />
        <button type="submit">Sign in</button>
        <div id="err" class="err">Wrong username or password.</div>
      </form>
      <div class="foot">Stays signed in for 60 days on this browser.</div>
    </div>
    <script>
      // Show the error message if redirected back with ?e=1, without leaking it
      // into the saved URL.
      if (/[?&]e=1\b/.test(window.location.search)) {
        document.getElementById('err').classList.add('show');
      }
    </script>
  </body>
</html>
