name: Fix FreePBX WebSocket Port (Full)

on:
  workflow_dispatch:

jobs:
  fix-port:
    runs-on: ubuntu-latest
    steps:
      - name: Fix port 8089 and configure Asterisk WSS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 158.69.208.108
          username: root
          key: ${{ secrets.OVH_SSH_KEY }}
          script: |
            COMPOSE_FILE=$(docker inspect freepbx-pbx-1 --format '{{ index .Config.Labels "com.docker.compose.project.config_files" }}' 2>/dev/null)
            if [ -z "$COMPOSE_FILE" ]; then
              COMPOSE_DIR=$(docker inspect freepbx-pbx-1 --format '{{ index .Config.Labels "com.docker.compose.project.working_dir" }}' 2>/dev/null)
              COMPOSE_FILE="$COMPOSE_DIR/docker-compose.yml"
            fi
            echo "=== Compose file: $COMPOSE_FILE ==="

            echo "=== Checking for 8089 port mapping ==="
            if grep -q "8089:8089" "$COMPOSE_FILE"; then
              echo "Port 8089:8089 already mapped — but still not listening. Restarting..."
              cd $(dirname "$COMPOSE_FILE")
              docker compose up -d --force-recreate freepbx-pbx-1
              sleep 10
            else
              echo "Adding 8089:8089 port mapping..."
              # Insert after the 8080:80 line
              sed -i '/8080:80/a\      - "8089:8089"' "$COMPOSE_FILE"
              echo "--- Updated ports section ---"
              grep -A 2 "8080:80" "$COMPOSE_FILE"
              echo "--- Restarting container ---"
              cd $(dirname "$COMPOSE_FILE")
              docker compose up -d --force-recreate freepbx-pbx-1
              sleep 15
            fi

            echo "=== Port 8089 status after restart ==="
            ss -tlnp | grep 8089 || echo "NOTHING on 8089"

            echo "=== Container ports ==="
            docker ps --filter name=freepbx-pbx-1 --format "{{.Ports}}"

            echo "=== Asterisk http_additional.conf ==="
            docker exec freepbx-pbx-1 cat /etc/asterisk/http_additional.conf 2>/dev/null || echo "NOT FOUND"

            echo "=== Asterisk http_custom.conf ==="
            docker exec freepbx-pbx-1 cat /etc/asterisk/http_custom.conf 2>/dev/null || echo "NOT FOUND"

            echo "=== Is Asterisk listening on 8089 inside container? ==="
            docker exec freepbx-pbx-1 ss -tlnp 2>/dev/null | grep 8089 || echo "Asterisk NOT listening on 8089 inside container"

            echo "=== Asterisk HTTP status ==="
            docker exec freepbx-pbx-1 asterisk -rx "http show status" 2>/dev/null || echo "Could not query Asterisk"
