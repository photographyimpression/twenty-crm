name: Fix Asterisk HTTP v2

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Patch http_additional.conf and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 158.69.208.108
          username: root
          key: ${{ secrets.OVH_SSH_KEY }}
          script: |
            echo "=== http.conf content ==="
            docker exec freepbx-pbx-1 cat /etc/asterisk/http.conf 2>/dev/null || echo "NOT FOUND"

            echo "=== http_additional.conf first 20 lines ==="
            docker exec freepbx-pbx-1 head -30 /etc/asterisk/http_additional.conf 2>/dev/null

            echo "=== Is Asterisk process running? ==="
            docker exec freepbx-pbx-1 ps aux 2>/dev/null | grep asterisk | grep -v grep || echo "Asterisk process NOT found"

            echo "=== Asterisk CLI test ==="
            docker exec freepbx-pbx-1 asterisk -rx "core show version" 2>/dev/null || echo "CLI failed"

            echo "=== Directly patch http_additional.conf: enabled=no -> enabled=yes ==="
            docker exec freepbx-pbx-1 sed -i 's/^enabled=no/enabled=yes/' /etc/asterisk/http_additional.conf
            docker exec freepbx-pbx-1 grep "^enabled" /etc/asterisk/http_additional.conf

            echo "=== Also ensure bindaddr is 0.0.0.0 ==="
            docker exec freepbx-pbx-1 bash -c 'grep -q "^bindaddr" /etc/asterisk/http_additional.conf && sed -i "s/^bindaddr=.*/bindaddr=0.0.0.0/" /etc/asterisk/http_additional.conf || sed -i "/^enabled=yes/a bindaddr=0.0.0.0" /etc/asterisk/http_additional.conf'
            docker exec freepbx-pbx-1 grep -E "^(enabled|bindaddr|bindport)" /etc/asterisk/http_additional.conf

            echo "=== Reload Asterisk HTTP ==="
            docker exec freepbx-pbx-1 asterisk -rx "module reload res_http.so" 2>/dev/null || true
            sleep 3

            echo "=== HTTP status after reload ==="
            docker exec freepbx-pbx-1 asterisk -rx "http show status" 2>/dev/null || echo "Could not query"

            echo "=== Is 8088 listening inside container? ==="
            docker exec freepbx-pbx-1 ss -tlnp 2>/dev/null | grep 8088 || echo "NOT listening on 8088"

            echo "=== Test from host ==="
            CONTAINER_IP=$(docker inspect freepbx-pbx-1 --format '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}')
            echo "Container IP: $CONTAINER_IP"
            curl -s --max-time 3 "http://${CONTAINER_IP}:8088/httpstatus" && echo "8088 OK" || echo "8088 not responding"

            echo "=== Final WSS test ==="
            curl -sk --max-time 5 \
              -H "Upgrade: websocket" \
              -H "Connection: Upgrade" \
              -H "Sec-WebSocket-Key: dGhlIHNhbXBsZSBub25jZQ==" \
              -H "Sec-WebSocket-Version: 13" \
              https://pbx.impressionphotography.ca:8089/ws \
              -o /dev/null -w "WSS HTTP status: %{http_code}\n" || echo "WS test failed"

            echo "=== DONE ==="
