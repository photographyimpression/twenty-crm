name: Start Asterisk

on:
  workflow_dispatch:

jobs:
  start:
    runs-on: ubuntu-latest
    steps:
      - name: Start Asterisk and enable HTTP
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 158.69.208.108
          username: root
          key: ${{ secrets.OVH_SSH_KEY }}
          command_timeout: 180s
          script: |
            echo "=== MariaDB check ==="
            docker exec freepbx-pbx-1 mysqladmin ping 2>/dev/null && echo "MariaDB UP" || echo "MariaDB DOWN"

            echo "=== Current Asterisk status ==="
            docker exec freepbx-pbx-1 asterisk -rx "core show version" 2>/dev/null && echo "Already running" || {
              echo "Asterisk not running, starting via fwconsole..."
              docker exec freepbx-pbx-1 fwconsole start 2>&1 | tail -20
              sleep 10
            }

            echo "=== Verify Asterisk started ==="
            docker exec freepbx-pbx-1 asterisk -rx "core show version" 2>/dev/null || {
              echo "Still not running, trying fwconsole restart..."
              docker exec freepbx-pbx-1 fwconsole restart 2>&1 | tail -20
              sleep 15
              docker exec freepbx-pbx-1 asterisk -rx "core show version" 2>/dev/null || echo "ASTERISK STILL NOT RUNNING"
            }

            echo "=== Check http_additional.conf enabled setting ==="
            docker exec freepbx-pbx-1 grep "^enabled" /etc/asterisk/http_additional.conf 2>/dev/null

            echo "=== Patch http_additional.conf: enabled=yes ==="
            docker exec freepbx-pbx-1 sed -i 's/^enabled=no/enabled=yes/' /etc/asterisk/http_additional.conf
            docker exec freepbx-pbx-1 grep "^enabled" /etc/asterisk/http_additional.conf 2>/dev/null

            echo "=== Ensure bindaddr=0.0.0.0 ==="
            docker exec freepbx-pbx-1 sed -i 's/^bindaddr=.*/bindaddr=0.0.0.0/' /etc/asterisk/http_additional.conf
            docker exec freepbx-pbx-1 grep -E "^(enabled|bindaddr|bindport)" /etc/asterisk/http_additional.conf 2>/dev/null

            echo "=== Reload HTTP module ==="
            docker exec freepbx-pbx-1 asterisk -rx "module reload res_http_websocket.so" 2>/dev/null || true
            docker exec freepbx-pbx-1 asterisk -rx "module reload res_http.so" 2>/dev/null || true
            sleep 3

            echo "=== HTTP show status ==="
            docker exec freepbx-pbx-1 asterisk -rx "http show status" 2>/dev/null || echo "Could not query"

            echo "=== Is 8088 listening? ==="
            docker exec freepbx-pbx-1 ss -tlnp 2>/dev/null | grep 8088 || echo "NOT on 8088"

            echo "=== Container IP and WSS test ==="
            CONTAINER_IP=$(docker inspect freepbx-pbx-1 --format '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}')
            echo "Container IP: $CONTAINER_IP"
            curl -s --max-time 5 "http://${CONTAINER_IP}:8088/httpstatus" && echo " 8088 OK" || echo "8088 not responding"

            curl -sk --max-time 5 \
              -H "Upgrade: websocket" \
              -H "Connection: Upgrade" \
              -H "Sec-WebSocket-Key: dGhlIHNhbXBsZSBub25jZQ==" \
              -H "Sec-WebSocket-Version: 13" \
              https://pbx.impressionphotography.ca:8089/ws \
              -o /dev/null -w "WSS HTTP status: %{http_code}\n" || echo "WS test failed"

            echo "=== DONE ==="
