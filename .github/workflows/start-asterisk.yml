name: Start Asterisk

on:
  workflow_dispatch:

jobs:
  start:
    runs-on: ubuntu-latest
    steps:
      - name: Start Asterisk via fwconsole
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 158.69.208.108
          username: root
          key: ${{ secrets.OVH_SSH_KEY }}
          script: |
            echo "=== Current Asterisk process status ==="
            docker exec freepbx-pbx-1 ps aux 2>/dev/null | grep -E "(asterisk|fwconsole)" | grep -v grep || echo "No asterisk process found"

            echo "=== Try fwconsole start ==="
            docker exec freepbx-pbx-1 fwconsole start 2>/dev/null || echo "fwconsole start failed"
            sleep 5

            echo "=== Try fwconsole restart if start failed ==="
            docker exec freepbx-pbx-1 asterisk -rx "core show version" 2>/dev/null || {
              echo "Asterisk not yet running, trying fwconsole restart..."
              docker exec freepbx-pbx-1 fwconsole restart 2>/dev/null || true
              sleep 15
            }

            echo "=== Check Asterisk process after start ==="
            docker exec freepbx-pbx-1 ps aux 2>/dev/null | grep asterisk | grep -v grep | head -5 || echo "Still no asterisk process"

            echo "=== Asterisk version ==="
            docker exec freepbx-pbx-1 asterisk -rx "core show version" 2>/dev/null || echo "CLI still failed"

            echo "=== HTTP show status ==="
            docker exec freepbx-pbx-1 asterisk -rx "http show status" 2>/dev/null || echo "Could not query"

            echo "=== Is 8088 listening? ==="
            docker exec freepbx-pbx-1 ss -tlnp 2>/dev/null | grep 8088 || echo "NOT on 8088"

            echo "=== Test from host ==="
            CONTAINER_IP=$(docker inspect freepbx-pbx-1 --format '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}')
            echo "Container IP: $CONTAINER_IP"
            curl -s --max-time 5 "http://${CONTAINER_IP}:8088/httpstatus" && echo "8088 OK" || echo "8088 not responding"

            echo "=== Final WSS test ==="
            curl -sk --max-time 5 \
              -H "Upgrade: websocket" \
              -H "Connection: Upgrade" \
              -H "Sec-WebSocket-Key: dGhlIHNhbXBsZSBub25jZQ==" \
              -H "Sec-WebSocket-Version: 13" \
              https://pbx.impressionphotography.ca:8089/ws \
              -o /dev/null -w "WSS HTTP status: %{http_code}\n" || echo "WS test failed"

            echo "=== DONE ==="
