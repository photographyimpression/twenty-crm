name: Fix Asterisk HTTP Server

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Enable Asterisk HTTP and reload
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 158.69.208.108
          username: root
          key: ${{ secrets.OVH_SSH_KEY }}
          script: |
            echo "=== Current http_additional.conf ==="
            docker exec freepbx-pbx-1 cat /etc/asterisk/http_additional.conf 2>/dev/null || echo "NOT FOUND"

            echo "=== Overwrite http_custom.conf with full bind settings ==="
            docker exec freepbx-pbx-1 bash -c 'cat > /etc/asterisk/http_custom.conf << EOF
[general]
enabled=yes
bindaddr=0.0.0.0
bindport=8088
EOF'
            echo "Written."

            echo "=== Reload Asterisk HTTP module ==="
            docker exec freepbx-pbx-1 asterisk -rx "module reload res_http.so" 2>/dev/null || true
            sleep 2

            echo "=== Asterisk HTTP status after reload ==="
            docker exec freepbx-pbx-1 asterisk -rx "http show status" 2>/dev/null || echo "Could not query"

            echo "=== Is 8088 listening inside container? ==="
            docker exec freepbx-pbx-1 ss -tlnp 2>/dev/null | grep 8088 || echo "NOT listening on 8088"

            echo "=== Test 8088 from host ==="
            CONTAINER_IP=$(docker inspect freepbx-pbx-1 --format '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}')
            echo "Container IP: $CONTAINER_IP"
            curl -s --max-time 3 "http://${CONTAINER_IP}:8088/httpstatus" && echo "8088 OK" || echo "8088 not responding"

            echo "=== If still not listening, restart Asterisk inside container ==="
            docker exec freepbx-pbx-1 ss -tlnp 2>/dev/null | grep -q 8088 || {
              echo "Restarting Asterisk process..."
              docker exec freepbx-pbx-1 asterisk -rx "core restart now" 2>/dev/null || true
              sleep 15
              echo "After restart:"
              docker exec freepbx-pbx-1 asterisk -rx "http show status" 2>/dev/null || echo "Could not query"
              docker exec freepbx-pbx-1 ss -tlnp 2>/dev/null | grep 8088 || echo "Still NOT on 8088"
              curl -s --max-time 3 "http://${CONTAINER_IP}:8088/httpstatus" && echo "8088 OK" || echo "8088 still not responding"
            }

            echo "=== Final WSS test ==="
            curl -sk --max-time 5 \
              -H "Upgrade: websocket" \
              -H "Connection: Upgrade" \
              -H "Sec-WebSocket-Key: dGhlIHNhbXBsZSBub25jZQ==" \
              -H "Sec-WebSocket-Version: 13" \
              https://pbx.impressionphotography.ca:8089/ws \
              -o /dev/null -w "WSS HTTP status: %{http_code}\n" || echo "WS test failed"

            echo "=== DONE ==="
