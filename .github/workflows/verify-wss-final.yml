name: Verify WSS Final State

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check WSS status
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 158.69.208.108
          username: root
          key: ${{ secrets.OVH_SSH_KEY }}
          script: |
            echo "=== Port 8089 listener ==="
            ss -tlnp | grep 8089 || echo "NOTHING on 8089"

            echo "=== Who owns port 8089 ==="
            fuser 8089/tcp 2>/dev/null || echo "fuser not available"

            echo "=== Nginx pbx-websocket config ==="
            cat /etc/nginx/sites-enabled/pbx-websocket 2>/dev/null || echo "NOT FOUND"

            echo "=== Asterisk HTTP inside container ==="
            docker exec freepbx-pbx-1 asterisk -rx "http show status" 2>/dev/null || echo "Could not query"

            echo "=== Asterisk http_custom.conf ==="
            docker exec freepbx-pbx-1 cat /etc/asterisk/http_custom.conf 2>/dev/null || echo "NOT FOUND"

            echo "=== Container port 8088 reachable from host ==="
            CONTAINER_IP=$(docker inspect freepbx-pbx-1 --format '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}')
            echo "Container IP: $CONTAINER_IP"
            curl -s --max-time 3 "http://${CONTAINER_IP}:8088/httpstatus" && echo "8088 OK" || echo "8088 not responding"

            echo "=== WSS curl test ==="
            curl -sk --max-time 5 \
              -H "Upgrade: websocket" \
              -H "Connection: Upgrade" \
              -H "Sec-WebSocket-Key: dGhlIHNhbXBsZSBub25jZQ==" \
              -H "Sec-WebSocket-Version: 13" \
              https://pbx.impressionphotography.ca:8089/ws \
              -o /dev/null -w "WSS HTTP status: %{http_code}\n" || echo "WS test failed"

            echo "=== TLS cert subject on 8089 ==="
            echo | openssl s_client -connect pbx.impressionphotography.ca:8089 -servername pbx.impressionphotography.ca 2>/dev/null | openssl x509 -noout -subject -issuer -dates 2>/dev/null || echo "TLS still failing"

            echo "=== DONE ==="
