name: Open FreePBX Port 8089

on:
  workflow_dispatch:

jobs:
  open-port:
    runs-on: ubuntu-latest
    steps:
      - name: Open port 8089 on OVH server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 158.69.208.108
          username: root
          key: ${{ secrets.OVH_SSH_KEY }}
          script: |
            ufw allow 8089/tcp
            ufw allow 8089/udp
            ufw reload
            ufw status | grep 8089
            echo "Port 8089 opened successfully"
