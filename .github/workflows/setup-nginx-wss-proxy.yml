name: Setup Nginx WSS Proxy for Asterisk WebSocket

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Configure Nginx WSS proxy for Asterisk WebSocket
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 158.69.208.108
          username: root
          key: ${{ secrets.OVH_SSH_KEY }}
          script: |
            # Step 1: Enable Asterisk HTTP server (non-TLS) inside container
            echo "=== Enabling Asterisk HTTP server ==="
            docker exec freepbx-pbx-1 bash -c 'cat > /etc/asterisk/http_custom.conf << EOF
            [general]
            enabled=yes
            EOF'
            docker exec freepbx-pbx-1 asterisk -rx "module reload res_http_websocket.so" 2>/dev/null || true
            docker exec freepbx-pbx-1 asterisk -rx "http show status" 2>/dev/null || true
            sleep 2

            # Step 2: Get container internal IP
            echo "=== Getting container IP ==="
            CONTAINER_IP=$(docker inspect freepbx-pbx-1 --format '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}')
            echo "Container IP: $CONTAINER_IP"

            # Step 3: Test Asterisk HTTP internally
            echo "=== Testing Asterisk HTTP on container ==="
            curl -s --max-time 3 "http://${CONTAINER_IP}:8088/httpstatus" || echo "Not yet responding on 8088"

            # Step 4: Check existing SSL certs
            echo "=== Existing SSL certs ==="
            ls /etc/letsencrypt/live/ 2>/dev/null || echo "No letsencrypt certs"

            # Step 5: Find Nginx config for the CRM site
            echo "=== Nginx configs ==="
            ls /etc/nginx/sites-enabled/ 2>/dev/null || ls /etc/nginx/conf.d/ 2>/dev/null
            grep -rl "crm.impressionphotography.ca\|impressionphotography" /etc/nginx/sites-enabled/ /etc/nginx/conf.d/ 2>/dev/null | head -5
            grep -rl "server_name" /etc/nginx/sites-enabled/ /etc/nginx/conf.d/ 2>/dev/null | head -5

            # Step 6: Find which cert is used
            echo "=== SSL cert files ==="
            grep -r "ssl_certificate\b" /etc/nginx/ 2>/dev/null | grep -v "ssl_certificate_key" | head -5

            # Step 7: Create Nginx WSS proxy config for port 8089
            echo "=== Setting up Nginx WSS proxy on port 8089 ==="

            # Remove docker port mapping for 8089 (so Nginx can take port 8089)
            COMPOSE_FILE="/opt/freepbx/docker-compose.yml"
            if grep -q '"8089:8089"' "$COMPOSE_FILE"; then
              sed -i '/"8089:8089"/d' "$COMPOSE_FILE"
              echo "Removed 8089:8089 from compose"
              cd /opt/freepbx && docker compose up -d --force-recreate pbx
              sleep 10
            fi

            # Get cert for pbx domain (check if it exists first)
            PBX_CERT=""
            PBX_KEY=""
            if [ -f "/etc/letsencrypt/live/pbx.impressionphotography.ca/fullchain.pem" ]; then
              PBX_CERT="/etc/letsencrypt/live/pbx.impressionphotography.ca/fullchain.pem"
              PBX_KEY="/etc/letsencrypt/live/pbx.impressionphotography.ca/privkey.pem"
              echo "Using existing pbx cert"
            elif [ -f "/etc/letsencrypt/live/impressionphotography.ca/fullchain.pem" ]; then
              # Try wildcard cert
              PBX_CERT="/etc/letsencrypt/live/impressionphotography.ca/fullchain.pem"
              PBX_KEY="/etc/letsencrypt/live/impressionphotography.ca/privkey.pem"
              echo "Using wildcard cert"
            else
              # Find any available cert
              FIRST_CERT=$(ls /etc/letsencrypt/live/ 2>/dev/null | head -1)
              if [ -n "$FIRST_CERT" ]; then
                PBX_CERT="/etc/letsencrypt/live/${FIRST_CERT}/fullchain.pem"
                PBX_KEY="/etc/letsencrypt/live/${FIRST_CERT}/privkey.pem"
                echo "Using first available cert: $FIRST_CERT"
              fi
            fi

            echo "Using cert: $PBX_CERT"
            echo "Using key: $PBX_KEY"

            # Create Nginx config for WebSocket proxy on port 8089
            cat > /etc/nginx/sites-available/pbx-websocket << NGINXEOF
            server {
                listen 8089 ssl;
                listen [::]:8089 ssl;
                server_name pbx.impressionphotography.ca _;

                ssl_certificate ${PBX_CERT};
                ssl_certificate_key ${PBX_KEY};
                ssl_protocols TLSv1.2 TLSv1.3;
                ssl_ciphers HIGH:!aNULL:!MD5;

                location /ws {
                    proxy_pass http://${CONTAINER_IP}:8088/ws;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade \$http_upgrade;
                    proxy_set_header Connection "Upgrade";
                    proxy_set_header Host \$host;
                    proxy_read_timeout 3600;
                    proxy_send_timeout 3600;
                }
            }
            NGINXEOF

            ln -sf /etc/nginx/sites-available/pbx-websocket /etc/nginx/sites-enabled/pbx-websocket

            echo "=== Testing Nginx config ==="
            nginx -t

            echo "=== Reloading Nginx ==="
            systemctl reload nginx

            echo "=== Port 8089 status (should be Nginx now) ==="
            ss -tlnp | grep 8089

            echo "=== Testing WSS via curl ==="
            sleep 3
            curl -sk --max-time 5 \
              -H "Upgrade: websocket" \
              -H "Connection: Upgrade" \
              -H "Sec-WebSocket-Key: dGhlIHNhbXBsZSBub25jZQ==" \
              -H "Sec-WebSocket-Version: 13" \
              https://pbx.impressionphotography.ca:8089/ws \
              -o /dev/null -w "HTTP %{http_code}\n" || echo "WS test failed"
