name: Build and Deploy Custom Twenty CRM

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/twenty-docker/twenty/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NODE_ENV=production
            REACT_APP_TELNYX_SIP_USERNAME=${{ secrets.REACT_APP_TELNYX_SIP_USERNAME }}
            REACT_APP_TELNYX_SIP_PASSWORD=${{ secrets.REACT_APP_TELNYX_SIP_PASSWORD }}
            REACT_APP_TELNYX_FROM_NUMBER=${{ secrets.REACT_APP_TELNYX_FROM_NUMBER }}

  deploy-to-ovh:
    needs: build-and-push-image
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH to OVH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 158.69.208.108
          username: root
          key: ${{ secrets.OVH_SSH_KEY }}
          script: |
            echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd /opt/twenty

            # Inject Telnyx and AI server-side credentials into .env (idempotent)
            grep -q '^TELNYX_API_KEY=' .env || echo 'TELNYX_API_KEY=' >> .env
            sed -i "s|^TELNYX_API_KEY=.*|TELNYX_API_KEY=${{ secrets.TELNYX_API_KEY }}|" .env

            grep -q '^TELNYX_FROM_NUMBER=' .env || echo 'TELNYX_FROM_NUMBER=' >> .env
            sed -i "s|^TELNYX_FROM_NUMBER=.*|TELNYX_FROM_NUMBER=${{ secrets.TELNYX_FROM_NUMBER }}|" .env

            grep -q '^TELNYX_MESSAGING_PROFILE_ID=' .env || echo 'TELNYX_MESSAGING_PROFILE_ID=' >> .env
            sed -i "s|^TELNYX_MESSAGING_PROFILE_ID=.*|TELNYX_MESSAGING_PROFILE_ID=${{ secrets.TELNYX_MESSAGING_PROFILE_ID }}|" .env

            grep -q '^ANTHROPIC_API_KEY=' .env || echo 'ANTHROPIC_API_KEY=' >> .env
            sed -i "s|^ANTHROPIC_API_KEY=.*|ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}|" .env

            grep -q '^EMAIL_SMTP_HOST=' .env || echo 'EMAIL_SMTP_HOST=' >> .env
            sed -i "s|^EMAIL_SMTP_HOST=.*|EMAIL_SMTP_HOST=${{ secrets.EMAIL_SMTP_HOST }}|" .env

            grep -q '^EMAIL_SMTP_USER=' .env || echo 'EMAIL_SMTP_USER=' >> .env
            sed -i "s|^EMAIL_SMTP_USER=.*|EMAIL_SMTP_USER=${{ secrets.EMAIL_SMTP_USER }}|" .env

            grep -q '^EMAIL_SMTP_PASSWORD=' .env || echo 'EMAIL_SMTP_PASSWORD=' >> .env
            sed -i "s|^EMAIL_SMTP_PASSWORD=.*|EMAIL_SMTP_PASSWORD=${{ secrets.EMAIL_SMTP_PASSWORD }}|" .env

            grep -q '^EMAIL_FROM_ADDRESS=' .env || echo 'EMAIL_FROM_ADDRESS=' >> .env
            sed -i "s|^EMAIL_FROM_ADDRESS=.*|EMAIL_FROM_ADDRESS=${{ secrets.EMAIL_FROM_ADDRESS }}|" .env

            sed -i 's|image: twentycrm/twenty.*|image: ghcr.io/${{ env.IMAGE_NAME }}:latest|' docker-compose.yml
            docker compose pull
            docker compose up -d
