name: Restart FreePBX with Correct Port Mapping

on:
  workflow_dispatch:

jobs:
  restart:
    runs-on: ubuntu-latest
    steps:
      - name: Restart FreePBX container with correct service name
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 158.69.208.108
          username: root
          key: ${{ secrets.OVH_SSH_KEY }}
          script: |
            COMPOSE_FILE="/opt/freepbx/docker-compose.yml"
            COMPOSE_DIR="/opt/freepbx"

            echo "=== Current compose ports for pbx service ==="
            grep -A 30 "^  pbx:" "$COMPOSE_FILE" | grep -A 20 "ports:" | head -25 || true
            grep "8089" "$COMPOSE_FILE" || echo "8089 not found in compose file"

            echo "=== Restarting container with correct service name ==="
            cd "$COMPOSE_DIR"
            docker compose up -d --force-recreate pbx
            sleep 10

            echo "=== Port 8089 on host after restart ==="
            ss -tlnp | grep 8089 || echo "NOTHING on 8089"

            echo "=== Container ports ==="
            docker ps --filter name=freepbx-pbx-1 --format "{{.Ports}}"

            echo "=== WSS connection test ==="
            curl -sk --max-time 5 https://pbx.impressionphotography.ca:8089/ws -o /dev/null -w "HTTP %{http_code}\n" || echo "Connection failed"
